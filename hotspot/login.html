<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="-1" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Winbox Retro Login</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    background: #000080;
    font-family: 'Press Start 2P', monospace;
    margin: 0;
    color: #000;
}

.window {
    width: 340px;
    margin: 80px auto;
    background: #c0c0c0;
    border: 3px solid #fff;
    box-shadow: inset -3px -3px #808080, inset 3px 3px #ffffff;
}

.title-bar {
    background: #0000aa;
    color: #fff;
    padding: 8px;
    font-size: 10px;
}

.content {
    padding: 15px;
    text-align: center;
}

.welcome {
    font-size: 8px;
    margin-bottom: 10px;
    color: #000;
}

input[type="text"],
input[type="password"] {
    width: 90%;
    padding: 8px;
    margin: 8px 0;
    border: 2px solid #000;
    font-family: monospace;
}

input[type="submit"] {
    margin-top: 10px;
    padding: 10px;
    font-size: 10px;
    background: #c0c0c0;
    border: 3px solid #fff;
    cursor: pointer;
    box-shadow: inset -3px -3px #808080, inset 3px 3px #ffffff;
}

input[type="submit"]:active {
    box-shadow: inset 3px 3px #808080, inset -3px -3px #ffffff;
}

.info {
    font-size: 8px;
    margin-bottom: 10px;
}

.footer {
    font-size: 8px;
    margin-top: 10px;
}
</style>

</head>

<body>

$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post" style="display:none">
    <input type="hidden" name="username" />
    <input type="hidden" name="password" />
    <input type="hidden" name="dst" value="$(link-orig)" />
    <input type="hidden" name="popup" value="true" />
</form>

<script src="/md5.js"></script>
<script>
function doLogin() {
    document.sendin.username.value = document.login.username.value;
    document.sendin.password.value =
        hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
    document.sendin.submit();
    return false;
}
</script>
$(endif)

<div class="window">
    <div class="title-bar">
        Winbox Hotspot Login.exe
    </div>

    <div class="content">

        <!-- SAMBUTAN -->
        <div class="welcome">
            Welcome to <br>
            <b>ZIEAN</b>
        </div>

        <p class="info $(if error)alert$(endif)">
        $(if error == "")
            Please login to network
        $(endif)

        $(if error)
            $(error)
        $(endif)
        </p>

        <form name="login" action="$(link-login-only)" method="post"
        $(if chap-id) onSubmit="return doLogin()" $(endif)>

            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />

            <input name="username" type="text" value="$(username)" placeholder="USERNAME" />

            <input name="password" type="password" placeholder="PASSWORD" />

            <input type="submit" value="CONNECT">
        </form>

        <div class="footer">
            MikroTik RouterOS - Retro UI Mode
        </div>

    </div>
</div>

</body>
</html>
